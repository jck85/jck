<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>jck</title>
        <link rel="stylesheet" type="text/css" href="../css/main.css" />

        <script
            src="https://kit.fontawesome.com/cdcc65decb.js"
            crossorigin="anonymous"
        ></script>
    </head>

    <body>
        <nav>
            <div class="nav-home">
                <a href="../index.html">home</a>
            </div>

            <div class="nav-menu">
                <a href="stuff.html">stuff</a>
                <a href="https://github.com/intern-jck/jck.git">src</a>
            </div>
        </nav>

        <main>
            <div class="app">
                <div class="app-content">
                    <div class="content flex-row-wrap">
                        <div
                            id="voronoi-container"
                            class="flex-col stuff-canvas"
                        >
                            <div class="flex-row flex-end">
                                <i class="fa-solid fa-expand"></i>
                                <i class="fa-solid fa-maximize"></i>
                                <i class="fa-solid fa-play"></i>
                            </div>

                            <svg id="voronoi" class="canvas-20"></svg>
                        </div>

                        <div id="vortex-container" class="flex-row">
                            <svg id="vortex" class="canvas-20"></svg>
                        </div>

                        <div id="set-container" class="flex-row">
                            <svg id="set" class="canvas-20"></svg>
                        </div>

                        <div id="blocks-canvas-container" class="flex-row">
                            <div id="blocks-canvas" class="canvas-20"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script src="../js/lib/matter.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
        <script src="../js/lib/SVG.js"></script>
        <script src="../js/lib/utils.js"></script>
        <script src="../js/voronoi.js"></script>
        <script src="../js/vortex-graph.js"></script>
        <script src="../js/set.js"></script>
        <script src="../js/blocks.js"></script>
    </body>
</html>
