<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>jck</title>
        <link rel="stylesheet" type="text/css" href="../css/main.css" />
        <link rel="stylesheet" type="text/css" href="../css/set.css" />

        <script
            src="https://kit.fontawesome.com/cdcc65decb.js"
            crossorigin="anonymous"
        ></script>
    </head>

    <body>
        <nav>
            <div class="nav-home">
                <a href="../index.html">home</a>
            </div>

            <div class="nav-menu">
                <a href="stuff.html">stuff</a>
                <a href="https://github.com/intern-jck/jck.git">src</a>
            </div>
        </nav>

        <div class="app">
            <h1 class="app-header">Set</h1>
            <div class="app-content">
                <div class="set-content">
                    <!-- <div id="set" class="set-canvas"></div> -->
                    <svg id="set" class="set-canvas"></svg>

                    <div class="set-controls">
                        <button class="btn game-btn m-1" onclick="newGame()">
                            NEW
                        </button>
                        <!-- <button class="btn game-btn m-1" onclick="easyMode();" id="easy-btn">EASY</button> -->
                        <button class="btn game-btn m-1" onclick="checkMatch()">
                            CHECK
                        </button>
                        <button class="btn game-btn m-1" onclick="getHint()">
                            HINT
                        </button>
                        <button class="btn game-btn m-1" onclick="drawThree()">
                            DRAW 3
                        </button>
                        <a class="nav-link" href="#" onclick="showRules()"
                            >Rules</a
                        >
                    </div>
                </div>
            </div>
        </div>

        <script src="../js/lib/utils.js"></script>
        <script src="../js/lib/SVG.js"></script>
        <script src="../js/set-class.js"></script>
    </body>
