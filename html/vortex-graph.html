<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>jck</title>
        <link rel="stylesheet" type="text/css" href="../css/main.css" />
        <link rel="stylesheet" type="text/css" href="../css/vortex-graph.css" />

        <script
            src="https://kit.fontawesome.com/cdcc65decb.js"
            crossorigin="anonymous"
        ></script>
    </head>

    <body>
        <nav>
            <div class="nav-home">
                <a href="../index.html">home</a>
            </div>
            <div class="nav-menu">
                <a href="stuff.html">stuff</a>
                <a href="https://github.com/intern-jck/jck.git">src</a>
            </div>
        </nav>

        <main>
            <div class="page-header">
                <h1>Vortex Graph</h1>
            </div>

            <div class="page-content">
                <div class="svg-content">
                    <div id="canvas-container" class="canvas-container">
                        <svg id="vortex-canvas" class="svg-canvas"></svg>
                    </div>

                    <div class="svg-controls">
                        <div class="svg-control-row">
                            <button id="refresh-svg" class="control-button">
                                <i class="fa-solid fa-arrows-rotate"></i>
                            </button>
                            <button
                                id="download-vortex-svg"
                                class="control-button"
                            >
                                <i class="fa-solid fa-file-arrow-down"></i>
                            </button>
                        </div>

                        <div class="svg-control-row">
                            <label for="modulus-number">Modulus</label>
                            <input
                                type="number"
                                id="modulus-number"
                                value="99"
                                min="2"
                                max="99"
                            />
                            <input
                                type="range"
                                id="modulus-range"
                                value="96"
                                min="2"
                                max="100"
                                step="1.0"
                            />
                        </div>

                        <div class="svg-control-row">
                            <label for="multiplier-number"> Multiplier </label>
                            <input
                                type="number"
                                id="multiplier-number"
                                value="80"
                                min="1"
                                max="99"
                            />
                            <input
                                type="range"
                                id="multiplier-range"
                                value="2"
                                min="0"
                                max="100"
                                step="1.0"
                            />
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script src="../js/lib/utils.js"></script>
        <script src="../js/lib/SVG.js"></script>
        <script src="../js/vortex-graph.js"></script>
    </body>
</html>
